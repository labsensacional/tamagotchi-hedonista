<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Sensagotchi</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a14">

    <!-- Primary Meta Tags -->
    <meta name="title" content="Sensagotchi" />
    <meta name="description" content="Simulation framework for modeling limbic and affective dynamics under abstract human actions" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sensagotchi.netlify.app/" />
    <meta property="og:title" content="Sensagotchi" />
    <meta property="og:description" content="Simulation framework for modeling limbic and affective dynamics under abstract human actions" />
    <meta property="og:image" content="https://sensagotchi.netlify.app/preview.png" />

    <!-- X (Twitter) -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://sensagotchi.netlify.app/" />
    <meta property="twitter:title" content="Sensagotchi" />
    <meta property="twitter:description" content="Simulation framework for modeling limbic and affective dynamics under abstract human actions" />
    <meta property="twitter:image" content="https://sensagotchi.netlify.app/preview.png" />
    <link rel="stylesheet" href="style.css">
    <!-- p5.js for procedural avatar -->
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <!-- Tone.js for procedural audio -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
</head>
<body>
<div id="app">

    <!-- ── Avatar section ──────────────────────────────── -->
    <div id="avatar-section">
        <div id="bg"></div>

        <button id="reset-btn" onclick="resetGame()">↺ reset</button>
        <a id="lab-btn" href="emotions-expression-test.html">lab →</a>

        <!-- HUD bars: tap anywhere to toggle detail panel -->
        <div id="hud" onclick="this.classList.toggle('open'); event.stopPropagation()">
            <div class="hud-row">
                <span class="hud-label" data-tip="liking">😊</span>
                <div class="hud-track">
                    <div class="hud-fill" id="hud-liking" style="--color:#ff9f43"></div>
                </div>
            </div>
            <div class="hud-row">
                <span class="hud-label" data-tip="arousal">🔥</span>
                <div class="hud-track">
                    <div class="hud-fill" id="hud-arousal" style="--color:#a29bfe"></div>
                </div>
            </div>
            <div class="hud-row">
                <span class="hud-label" data-tip="energy">⚡</span>
                <div class="hud-track">
                    <div class="hud-fill" id="hud-energy" style="--color:#00b894"></div>
                </div>
            </div>
            <div class="hud-row">
                <span class="hud-label" data-tip="hunger">🍔</span>
                <div class="hud-track">
                    <div class="hud-fill" id="hud-hunger" style="--color:#e67e22"></div>
                </div>
            </div>
            <div class="hud-row">
                <span class="hud-label" data-tip="sleepiness">😴</span>
                <div class="hud-track">
                    <div class="hud-fill" id="hud-sleepiness" style="--color:#636e72"></div>
                </div>
            </div>
            <div class="hud-row">
                <span class="hud-label" data-tip="anxiety">😰</span>
                <div class="hud-track">
                    <div class="hud-fill" id="hud-anxiety" style="--color:#ee5a24"></div>
                </div>
            </div>
            <!-- Detail panel: tap HUD to toggle -->
            <div id="hud-detail"></div>
        </div>

        <!-- Avatar (p5.js procedural monster) -->
        <div class="avatar-container anim-idle" id="avatar-container">
            <div id="avatar-canvas-wrap"></div>
        </div>

        <!-- Audio toggle -->
        <button id="audio-btn" onclick="toggleAudio()" title="Toggle sound">🔇</button>
    </div>

    <!-- ── Recent actions strip ─────────────────────────── -->
    <div id="recent-actions">
        <span class="recent-label">recent:</span>
    </div>

    <!-- ── Controls panel ───────────────────────────────── -->
    <div id="controls">
        <div id="search-wrap">
            <input id="search-input" type="text"
                   placeholder="🔍 search actions..."
                   autocomplete="off"
                   autocorrect="off"
                   spellcheck="false">
        </div>
        <div id="action-area">
            <!-- populated by JS -->
        </div>
    </div>

</div><!-- #app -->
<script src="monster.js"></script>
<script src="main.js" type="module"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
  }
</script>
</body>
</html>
